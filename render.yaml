services:
  - type: web
    name: weave-impact
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python run.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.9"
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_REPO
        value: PostHog/posthog
      - key: CACHE_TTL_SECONDS
        value: "3600"
